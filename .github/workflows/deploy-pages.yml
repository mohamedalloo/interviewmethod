name: Deploy static demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Static export can't include POST route handlers; the live-AI API
      # runs only on server deploys (Vercel). The client falls back to
      # in-browser demo mode via NEXT_PUBLIC_STATIC=1.
      - run: rm -rf app/api
      - run: npm run build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_STATIC: "1"
          NEXT_PUBLIC_SITE_URL: https://mohamedalloo.github.io/interviewmethod
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
